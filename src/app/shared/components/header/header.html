<div class="main-div">
  <nav>
    <div
      class="logo-container"
      role="button"
      tabindex="0"
      (click)="scrollToSection('#home')"
      (keydown.enter)="scrollToSection('#home')"
      (keydown.space)="scrollToSection('#home'); $event.preventDefault()"
      style="cursor: pointer;">
      <img src="assets/noble/NameofCompany.svg" alt="Noble Wave" />
      <span class="company-tagline">{{ appConfig.tagline }}</span>
    </div>

    <ul class="nav-menu">
      @for (link of navLinks; track link) {
        <li>
          <a [href]="'#' + link.fragment" class="nav-link" (click)="scrollToSection('#' + link.fragment)"
            >{{ link.label }}</a
            >
          </li>
        }
        <li>
          <a
            href="#"
            class="nav-link cta-btn"
            (click)="scrollToSection('#contact')"
            >Get Started</a
            >
          </li>
          <li class="theme-toggle-item">
            <button class="theme-toggle-btn" (click)="toggleTheme()" [attr.aria-label]="isDarkMode ? 'Switch to light mode' : 'Switch to dark mode'">
              <span class="material-icons">{{ isDarkMode ? 'light_mode' : 'dark_mode' }}</span>
            </button>
          </li>
        </ul>

        <div
          class="mobile-menu-toggle"
          role="button"
          tabindex="0"
          aria-label="Toggle menu"
          (click)="toggleMobileMenu()"
          (keydown.enter)="toggleMobileMenu()"
          (keydown.space)="toggleMobileMenu(); $event.preventDefault()">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </nav>
    </div>

    <!-- Mobile Menu Backdrop -->
    <div
      class="mobile-menu-backdrop"
      role="button"
      tabindex="-1"
      aria-label="Close menu"
      [class.active]="isMobileMenuOpen"
      (click)="closeMobileMenu()"
      (keydown.escape)="closeMobileMenu()"></div>

    <!-- Mobile Menu -->
    <div class="mobile-menu" [class.active]="isMobileMenuOpen">
      <div class="mobile-menu-header">
        <div class="mobile-menu-branding">
          <img
            src="assets/noble/NameofCompany.svg"
            alt="Noble Wave"
            role="button"
            tabindex="0"
            (click)="scrollToSection('#home')"
            (keydown.enter)="scrollToSection('#home')"
            (keydown.space)="scrollToSection('#home'); $event.preventDefault()"
            style="cursor: pointer;" />
          <p class="mobile-menu-subtitle">{{ appConfig.tagline }}</p>
        </div>
        <button class="close-mobile-menu" (click)="closeMobileMenu()">
          ×
        </button>
      </div>
      <ul class="mobile-nav-links">
        @for (link of navLinks; track link) {
          <li>
            <a [href]="'#' + link.fragment" (click)="scrollToSection('#' + link.fragment)">
              <span class="material-icons">{{ link.icon }}</span>
              <span>{{ link.label }}</span>
            </a>
          </li>
        }
        <li>
          <a href="#" class="mobile-cta" (click)="scrollToSection('#contact')"
            >Get Started</a
            >
          </li>
          <li class="mobile-theme-toggle">
            <button class="mobile-theme-btn" (click)="toggleTheme()" [attr.aria-label]="isDarkMode ? 'Switch to light mode' : 'Switch to dark mode'">
              <span class="material-icons">{{ isDarkMode ? 'light_mode' : 'dark_mode' }}</span>
              <span>{{ isDarkMode ? 'Light Mode' : 'Dark Mode' }}</span>
            </button>
          </li>
        </ul>
      </div>
